name: relife_ai
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.0
  provider: ^6.1.5+1
  http: ^1.6.0
  image_picker: ^1.2.1
  go_router: ^17.1.0
  flutter_dotenv: ^6.0.0
  google_fonts: ^8.0.2
  font_awesome_flutter: ^11.0.0
  fl_chart: ^1.2.0
  intl: any
  url_launcher: ^6.3.2
  simple_barcode_scanner: ^0.4.0
  tflite_flutter: ^0.11.0
  path_provider: ^2.1.5
  image: ^4.1.3
  csv: ^8.0.0
  google_generative_ai: ^0.4.7
  speech_to_text: ^7.3.0
  permission_handler: ^12.0.1
  flutter_tts: ^4.2.5
  pdf: ^3.12.0
  printing: ^5.14.3
  share_plus: ^12.0.2

  shared_preferences: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/ai/
    - assets/icon/app_icon.png
    - assets/images/splash.png
    - assets/images/transparent_logo.png
    - assets/data/shelf_life_dataset_large.csv

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#4C1D95"
  image: "assets/images/transparent_logo.png"
  background_image: "assets/images/splash.png"
  fullscreen: true
  android_12:
    color: "#4C1D95"
    image: "assets/images/transparent_logo.png"
